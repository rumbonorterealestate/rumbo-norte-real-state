<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Administración | Rumbo Norte Real Estate</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <header class="header scrolled">
    <div class="header-inner">
      <a href="../index.html" class="logo" aria-label="Rumbo Norte Real Estate — Inicio">
        <img src="../images/logo.png" alt="Rumbo Norte Real Estate" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.classList.add('show');">
        <span class="logo-fallback">RUMBO NORTE</span>
      </a>
      <a href="../index.html" class="header-cta">Volver al inicio</a>
    </div>
  </header>

  <main class="login-page">
    <div class="login-card">
      <h1>Acceso administración</h1>
      <p class="login-subtitle">Panel de gestión de inmuebles</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@rumbo-norte.es" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Tu contraseña" required>
        </div>
        <div id="loginError" class="login-error" style="display:none;"></div>
        <button type="submit" class="btn-submit" id="loginBtn">Iniciar sesión</button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
